# Deploy the Sentinel backend to the Oracle VM.
#
# Runs ONLY when backend-relevant files change on `main` (the path filter below)
# or when triggered manually. The frontend is deployed separately by Vercel's
# Git integration, so it is intentionally absent here.
#
# How it works: the GitHub runner checks out the repo, rsyncs it to the VM
# (preserving the VM's untracked `.env` secrets), then rebuilds + restarts the
# backend container via the prod compose file. This does NOT require the VM to
# be a git checkout or to hold any git credentials.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   ORACLE_HOST        public IP or hostname of the VM (e.g. 80.225.243.198)
#   ORACLE_USER        SSH user (e.g. ubuntu)
#   ORACLE_SSH_KEY     the PRIVATE SSH key (full contents, incl. BEGIN/END lines)
# Optional:
#   ORACLE_PORT        SSH port (defaults to 22)
#   ORACLE_APP_DIR     repo path on the VM, absolute or relative to the SSH
#                      user's home (defaults to `sentinel`, i.e. ~/sentinel)

name: Deploy Backend (Oracle)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'tsconfig.base.json'
      - 'docker-compose.prod.yml'
      - 'Caddyfile'
      - '.dockerignore'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

# Never run two deploys at once.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
      ORACLE_USER: ${{ secrets.ORACLE_USER }}
      ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT || '22' }}
      APP_DIR: ${{ secrets.ORACLE_APP_DIR || 'sentinel' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "$ORACLE_HOST" ] && missing+=(ORACLE_HOST)
          [ -z "$ORACLE_USER" ] && missing+=(ORACLE_USER)
          [ -z "$ORACLE_SSH_KEY" ] && missing+=(ORACLE_SSH_KEY)
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required repo secrets: ${missing[*]}. Add them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$ORACLE_PORT" -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure rsync is available on the VM
        run: |
          ssh -i ~/.ssh/id_deploy -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            'command -v rsync >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y rsync; }'

      - name: Sync repo to the VM (preserves the VM .env)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='dist' \
            --exclude='**/dist' \
            --exclude='.vercel' \
            --exclude='frontend' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_deploy -p $ORACLE_PORT" \
            ./ "$ORACLE_USER@$ORACLE_HOST:$APP_DIR/"

      - name: Rebuild + restart backend
        run: |
          ssh -i ~/.ssh/id_deploy -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            "cd \"$APP_DIR\" && docker compose -f docker-compose.prod.yml up -d --build backend && docker image prune -f && docker compose -f docker-compose.prod.yml ps"
